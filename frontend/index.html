<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP PDV | CRM + PDV + Admin</title>
    <meta
      name="description"
      content="Base frontend do sistema ERP + PDV + CRM para supermercado."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="app-body">
    <div class="app-shell" id="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>

      <div class="app-panel">
        <header class="app-header" id="app-header"></header>

        <main class="app-content" id="app-content">
          <section class="page-loading" id="page-loading">
            <div class="spinner-border text-success" role="status" aria-hidden="true"></div>
            <p class="page-loading__text">Carregando estrutura inicial...</p>
          </section>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
